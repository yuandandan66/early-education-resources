<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>游戏二：坦克火箭影子配对</title>
<style>
  @page { size: A4; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    display: flex; justify-content: center;
    background: #f0f0f0;
  }
  .page {
    width: 210mm; min-height: 297mm;
    background: #FFFEF9;
    padding: 8mm 10mm 8mm;
    position: relative; overflow: hidden;
    box-shadow: 0 2px 20px rgba(0,0,0,0.08);
  }
  .header { text-align: center; margin-bottom: 3mm; }
  .header .num { font-size: 18px; color: #E85D3A; font-weight: 700; letter-spacing: 2px; }
  .header h1 { font-size: 36px; font-weight: 700; color: #E85D3A; margin: 2px 0; letter-spacing: 3px; }
  .header .instruction {
    font-size: 16px; color: #888; margin-top: 2px;
    background: #FFF5EE; display: inline-block; padding: 3px 22px; border-radius: 22px;
  }
  .game-area { text-align: center; margin: 2mm 0; }
  .hint-box {
    margin-top: 3mm;
    padding: 3mm 6mm;
    background: #FFF8F0;
    border-radius: 10px;
    border: 1.5px dashed #E8D5C4;
    display: flex; align-items: center; gap: 5mm;
    font-size: 14px; color: #8B7355;
  }
  .hint-box .icon { font-size: 28px; }
  .footer {
    text-align: center; margin-top: 3mm;
    font-size: 13px; color: #CCC; letter-spacing: 1px;
  }
  @media print {
    body { background: white; }
    .page { box-shadow: none; width: 100%; min-height: auto; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">

      <text x="50" y="625" font-size="15" fill="#AAA">A — ______　　B — ______　　C — ______　　D — ______　　E — ______　　F — ______</text>
