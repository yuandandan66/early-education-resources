<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>游戏五：连点成画</title>
<style>
  @page { size: A4; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    display: flex; justify-content: center;
    background: #f0f0f0;
  }
  .page {
    width: 210mm; min-height: 297mm;
    background: #FFFEF9;
    padding: 8mm 10mm 8mm;
    position: relative; overflow: hidden;
    box-shadow: 0 2px 20px rgba(0,0,0,0.08);
  }
  .header { text-align: center; margin-bottom: 3mm; }
  .header .num { font-size: 18px; color: #E85D3A; font-weight: 700; letter-spacing: 2px; }
  .header h1 { font-size: 36px; font-weight: 700; color: #E85D3A; margin: 2px 0; letter-spacing: 3px; }
  .header .instruction {
    font-size: 16px; color: #888; margin-top: 2px;
    background: #FFF5EE; display: inline-block; padding: 3px 22px; border-radius: 22px;
  }
  .game-area { text-align: center; }
  .hint-box {
    margin-top: 3mm;
    padding: 3mm 6mm;
    background: #FFF8F0;
    border-radius: 10px;
    border: 1.5px dashed #E8D5C4;
    display: flex; align-items: center; gap: 5mm;
    font-size: 14px; color: #8B7355;
  }
  .hint-box .icon { font-size: 28px; }
  .footer {
    text-align: center; margin-top: 3mm;
    font-size: 13px; color: #CCC; letter-spacing: 1px;
  }
  @media print {
    body { background: white; }
    .page { box-shadow: none; width: 100%; min-height: auto; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="num">🔢 游戏五</div>
    <h1>连点成画</h1>
    <div class="instruction">✏️ 按数字顺序1→20把点连起来，看看变出什么？</div>
  </div>

  <div class="game-area">
    <svg viewBox="0 0 580 780" xmlns="http://www.w3.org/2000/svg" style="width:100%; max-width:580px;">

      <!-- Decorative stars -->
      <g opacity="0.12">
        <circle cx="30" cy="200" r="3" fill="#FFD93D"/>
        <circle cx="550" cy="100" r="3" fill="#FFD93D"/>
        <circle cx="540" cy="550" r="3" fill="#FFD93D"/>
        <circle cx="40" cy="650" r="3" fill="#FFD93D"/>
        <circle cx="100" cy="80" r="2" fill="#FFD93D"/>
        <circle cx="500" cy="300" r="2" fill="#FFD93D"/>
      </g>

      <!-- Dotted hint outline (very light guide) -->
      <polyline points="290,100 330,125 370,165 395,210 410,270 415,335 410,400 395,455 370,515 330,555 290,575 250,555 210,515 190,455 175,400 170,335 175,270 195,210 220,165 255,125 290,100"
        fill="none" stroke="#DDD" stroke-width="1.5" stroke-dasharray="6,6" opacity="0.3"/>

      <!-- Fins hint -->
      <line x1="415" y1="400" x2="445" y2="460" stroke="#DDD" stroke-width="1.5" stroke-dasharray="6,6" opacity="0.2"/>
      <line x1="170" y1="400" x2="140" y2="460" stroke="#DDD" stroke-width="1.5" stroke-dasharray="6,6" opacity="0.2"/>

      <!-- Dot 1: Nose tip -->
      <circle cx="290" cy="100" r="13" fill="#FFE882" stroke="#E85D3A" stroke-width="3"/>
      <text x="290" y="95" font-size="15" fill="#E85D3A" font-weight="900" text-anchor="middle">1</text>

      <!-- Dot 2: Right shoulder -->
      <circle cx="330" cy="125" r="11" fill="#FFE882" stroke="#E85D3A" stroke-width="2.5"/>
      <text x="330" y="120" font-size="14" fill="#E85D3A" font-weight="900" text-anchor="middle">2</text>

      <!-- Dot 3: Right upper body -->
      <circle cx="370" cy="165" r="11" fill="#FFE882" stroke="#E85D3A" stroke-width="2.5"/>
      <text x="370" y="160" font-size="14" fill="#E85D3A" font-weight="900" text-anchor="middle">3</text>

      <!-- Dot 4: Right body upper-mid -->
      <circle cx="395" cy="210" r="11" fill="#FFE882" stroke="#E85D3A" stroke-width="2.5"/>
      <text x="395" y="205" font-size="14" fill="#E85D3A" font-weight="900" text-anchor="middle">4</text>

      <!-- Dot 5: Right body mid -->
      <circle cx="410" cy="270" r="11" fill="#FFE882" stroke="#E85D3A" stroke-width="2.5"/>
      <text x="410" y="265" font-size="14" fill="#E85D3A" font-weight="900" text-anchor="middle">5</text>

      <!-- Dot 6: Right window -->
      <circle cx="405" cy="325" r="11" fill="#FFE882" stroke="#E85D3A" stroke-width="2.5"/>
      <text x="405" y="320" font-size="14" fill="#E85D3A" font-weight="900" text-anchor="middle">6</text>

      <!-- Dot 7: Right body lower -->
      <circle cx="415" cy="360" r="11" fill="#FFE882" stroke="#E85D3A" stroke-width="2.5"/>
      <text x="415" y="355" font-size="14" fill="#E85D3A" font-weight="900" text-anchor="middle">7</text>

      <!-- Dot 8: Right fin inner -->
      <circle cx="405" cy="415" r="11" fill="#FFE882" stroke="#E85D3A" stroke-width="2.5"/>
      <text x="405" y="410" font-size="14" fill="#E85D3A" font-weight="900" text-anchor="middle">8</text>

      <!-- Dot 9: Right fin outer -->
      <circle cx="445" cy="460" r="11" fill="#FFE882" stroke="#E85D3A" stroke-width="2.5"/>
      <text x="445" y="455" font-size="14" fill="#E85D3A" font-weight="900" text-anchor="middle">9</text>

      <!-- Dot 10: Return right body bottom -->
      <circle cx="395" cy="470" r="11" fill="#FFE882" stroke="#E85D3A" stroke-width="2.5"/>
      <text x="395" y="465" font-size="14" fill="#E85D3A" font-weight="900" text-anchor="middle">10</text>

      <!-- Dot 11: Right bottom edge -->
      <circle cx="365" cy="515" r="11" fill="#FFE882" stroke="#E85D3A" stroke-width="2.5"/>
      <text x="365" y="510" font-size="14" fill="#E85D3A" font-weight="900" text-anchor="middle">11</text>

      <!-- Dot 12: Bottom center -->
      <circle cx="330" cy="555" r="11" fill="#FFE882" stroke="#E85D3A" stroke-width="2.5"/>
      <text x="330" y="550" font-size="14" fill="#E85D3A" font-weight="900" text-anchor="middle">12</text>

      <!-- Dot 13: Bottom flare right -->
      <circle cx="290" cy="575" r="13" fill="#FF6B4A" stroke="#E85D3A" stroke-width="3"/>
      <text x="290" y="570" font-size="15" fill="#FFF" font-weight="900" text-anchor="middle">13</text>

      <!-- Dot 14: Bottom flare left -->
      <circle cx="250" cy="555" r="11" fill="#FFE882" stroke="#E85D3A" stroke-width="2.5"/>
      <text x="250" y="550" font-size="14" fill="#E85D3A" font-weight="900" text-anchor="middle">14</text>

      <!-- Dot 15: Left bottom edge -->
      <circle cx="215" cy="515" r="11" fill="#FFE882" stroke="#E85D3A" stroke-width="2.5"/>
      <text x="215" y="510" font-size="14" fill="#E85D3A" font-weight="900" text-anchor="middle">15</text>

      <!-- Dot 16: Left fin return -->
      <circle cx="190" cy="470" r="11" fill="#FFE882" stroke="#E85D3A" stroke-width="2.5"/>
      <text x="190" y="465" font-size="14" fill="#E85D3A" font-weight="900" text-anchor="middle">16</text>

      <!-- Dot 17: Left fin outer -->
      <circle cx="140" cy="460" r="11" fill="#FFE882" stroke="#E85D3A" stroke-width="2.5"/>
      <text x="140" y="455" font-size="14" fill="#E85D3A" font-weight="900" text-anchor="middle">17</text>

      <!-- Dot 18: Left fin inner -->
      <circle cx="180" cy="415" r="11" fill="#FFE882" stroke="#E85D3A" stroke-width="2.5"/>
      <text x="180" y="410" font-size="14" fill="#E85D3A" font-weight="900" text-anchor="middle">18</text>

      <!-- Dot 19: Left window -->
      <circle cx="170" cy="340" r="11" fill="#FFE882" stroke="#E85D3A" stroke-width="2.5"/>
      <text x="170" y="335" font-size="14" fill="#E85D3A" font-weight="900" text-anchor="middle">19</text>

      <!-- Dot 20: Back to nose left -->
      <circle cx="265" cy="135" r="11" fill="#FFE882" stroke="#E85D3A" stroke-width="2.5"/>
      <text x="265" y="130" font-size="14" fill="#E85D3A" font-weight="900" text-anchor="middle">20</text>

      <!-- "Reveal" text hidden at bottom -->
      <text x="290" y="650" font-size="22" fill="#E8D5C4" font-weight="700" text-anchor="middle">连完啦！是一枚大火箭🚀</text>

      <!-- Small rocket decoration bottom -->
      <g transform="translate(480, 700)" opacity="0.12">
        <polygon points="0,-30 -10,-7 10,-7" fill="#E85D3A"/>
        <rect x="-9" y="-7" width="18" height="35" rx="7" fill="#FFA07A"/>
        <circle cx="-5" cy="5" r="4.5" fill="#FFE882"/><circle cx="5" cy="5" r="4.5" fill="#FFE882"/>
        <circle cx="0" cy="16" r="4.5" fill="#FFE882"/>
        <ellipse cx="0" cy="30" rx="12" ry="6" fill="#FF6B4A"/>
      </g>
      <g transform="translate(100, 700)" opacity="0.12">
        <polygon points="0,-30 -10,-7 10,-7" fill="#E85D3A"/>
        <rect x="-9" y="-7" width="18" height="35" rx="7" fill="#FFA07A"/>
        <circle cx="-5" cy="5" r="4.5" fill="#FFE882"/><circle cx="5" cy="5" r="4.5" fill="#FFE882"/>
        <circle cx="0" cy="16" r="4.5" fill="#FFE882"/>
        <ellipse cx="0" cy="30" rx="12" ry="6" fill="#FF6B4A"/>
      </g>

    </svg>
  </div>

  <div class="hint-box">
    <div class="icon">💡</div>
    <div>
      <strong>给妈妈的小贴士：</strong>先带宝宝念"1、2、3..."找到每个点再连。连歪了没关系，重点是数字顺序和手眼协调。连完后问"你连出来的是什么呀？"让他自己发现惊喜！连完了还可以涂上喜欢的颜色。
    </div>
  </div>

  <div class="footer">
    <span style="color:#E85D3A;">♥</span> 妈妈陪你一起冒险 <span style="color:#E85D3A;">♥</span> &nbsp;|&nbsp;
    完成日期：____月____日 &nbsp;|&nbsp;
    ⭐ 贴纸奖励 ⭐
  </div>

</div>
</body>
</html>
