<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>游戏一：火箭太空迷宫</title>
<style>
  @page { size: A4; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    display: flex; justify-content: center;
    background: #f0f0f0;
  }
  .page {
    width: 210mm; min-height: 297mm;
    background: #FFFEF9;
    padding: 8mm 10mm 8mm;
    position: relative;
    overflow: hidden;
    box-shadow: 0 2px 20px rgba(0,0,0,0.08);
  }
  .header { text-align: center; margin-bottom: 3mm; }
  .header .num { font-size: 18px; color: #E85D3A; font-weight: 700; letter-spacing: 2px; }
  .header h1 { font-size: 36px; font-weight: 700; color: #E85D3A; margin: 2px 0; letter-spacing: 3px; }
  .header .instruction {
    font-size: 16px; color: #888; margin-top: 2px;
    background: #FFF5EE; display: inline-block; padding: 3px 22px; border-radius: 22px;
  }
  .maze-area { text-align: center; margin: 2mm 0; }
  .hint-box {
    margin-top: 3mm;
    padding: 3mm 6mm;
    background: #FFF8F0;
    border-radius: 10px;
    border: 1.5px dashed #E8D5C4;
    display: flex; align-items: center; gap: 5mm;
    font-size: 14px; color: #8B7355;
  }
  .hint-box .icon { font-size: 28px; }
  .footer {
    text-align: center; margin-top: 3mm;
    font-size: 13px; color: #CCC; letter-spacing: 1px;
  }
  @media print {
    body { background: white; }
    .page { box-shadow: none; width: 100%; min-height: auto; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="num">🚀 游戏一</div>
    <h1>火箭太空迷宫</h1>
    <div class="instruction">✏️ 帮小火箭穿过小行星带，找到空间站！</div>
  </div>

  <div class="maze-area">
    <svg viewBox="0 0 580 800" xmlns="http://www.w3.org/2000/svg" style="width:100%; max-width:580px;">

      <!-- Background stars -->
      <g opacity="0.25">
        <circle cx="30" cy="30" r="3" fill="#FFD93D"/>
        <circle cx="150" cy="50" r="2.5" fill="#FFD93D"/>
        <circle cx="300" cy="25" r="3" fill="#FFD93D"/>
        <circle cx="500" cy="45" r="2.5" fill="#FFD93D"/>
        <circle cx="550" cy="150" r="3" fill="#FFD93D"/>
        <circle cx="20" cy="300" r="2.5" fill="#FFD93D"/>
        <circle cx="560" cy="400" r="2.5" fill="#FFD93D"/>
        <circle cx="30" cy="500" r="3" fill="#FFD93D"/>
        <circle cx="550" cy="600" r="2.5" fill="#FFD93D"/>
        <circle cx="40" cy="700" r="3" fill="#FFD93D"/>
        <circle cx="200" cy="760" r="2.5" fill="#FFD93D"/>
        <circle cx="400" cy="750" r="3" fill="#FFD93D"/>
      </g>

      <!-- Maze walls - thick lines, cells ~55px apart -->
      <!-- Grid: x = 35, 90, 145, 200, 255, 310, 365, 420, 475, 530 (10 columns)
           y = 55, 110, 165, 220, 275, 330, 385, 440, 495, 550, 605 (11 rows) -->

      <g stroke="#C4B8A0" stroke-width="5" stroke-linecap="round" fill="none">

        <!-- ===== Row 1 (y=110) ===== -->
        <line x1="200" y1="110" x2="255" y2="110"/>
        <line x1="310" y1="110" x2="365" y2="110"/>
        <line x1="420" y1="110" x2="530" y2="110"/>

        <!-- Row 2 (y=165) -->
        <line x1="35" y1="165" x2="90" y2="165"/>
        <line x1="145" y1="165" x2="255" y2="165"/>
        <line x1="310" y1="165" x2="420" y2="165"/>
        <line x1="475" y1="165" x2="530" y2="165"/>

        <!-- Row 3 (y=220) -->
        <line x1="35" y1="220" x2="145" y2="220"/>
        <line x1="200" y1="220" x2="310" y2="220"/>
        <line x1="365" y1="220" x2="420" y2="220"/>
        <line x1="475" y1="220" x2="530" y2="220"/>

        <!-- Row 4 (y=275) -->
        <line x1="35" y1="275" x2="200" y2="275"/>
        <line x1="255" y1="275" x2="310" y2="275"/>
        <line x1="365" y1="275" x2="530" y2="275"/>

        <!-- Row 5 (y=330) -->
        <line x1="35" y1="330" x2="90" y2="330"/>
        <line x1="145" y1="330" x2="255" y2="330"/>
        <line x1="310" y1="330" x2="365" y2="330"/>
        <line x1="420" y1="330" x2="530" y2="330"/>

        <!-- Row 6 (y=385) -->
        <line x1="35" y1="385" x2="145" y2="385"/>
        <line x1="200" y1="385" x2="310" y2="385"/>
        <line x1="365" y1="385" x2="475" y2="385"/>

        <!-- Row 7 (y=440) -->
        <line x1="145" y1="440" x2="200" y2="440"/>
        <line x1="255" y1="440" x2="365" y2="440"/>
        <line x1="420" y1="440" x2="530" y2="440"/>

        <!-- Row 8 (y=495) -->
        <line x1="35" y1="495" x2="145" y2="495"/>
        <line x1="200" y1="495" x2="310" y2="495"/>
        <line x1="365" y1="495" x2="420" y2="495"/>
        <line x1="475" y1="495" x2="530" y2="495"/>

        <!-- Row 9 (y=550) -->
        <line x1="35" y1="550" x2="90" y2="550"/>
        <line x1="200" y1="550" x2="255" y2="550"/>
        <line x1="310" y1="550" x2="420" y2="550"/>
        <line x1="475" y1="550" x2="530" y2="550"/>

        <!-- Row 10 (y=605) -- only walls -->
        <line x1="145" y1="605" x2="255" y2="605"/>
        <line x1="310" y1="605" x2="365" y2="605"/>
      </g>

      <g stroke="#C4B8A0" stroke-width="5" stroke-linecap="round" fill="none">
        <!-- ===== Vertical walls ===== -->
        <!-- Col 1 (x=90) -->
        <line x1="90" y1="55" x2="90" y2="165"/>
        <line x1="90" y1="220" x2="90" y2="275"/>
        <line x1="90" y1="330" x2="90" y2="440"/>
        <line x1="90" y1="495" x2="90" y2="605"/>

        <!-- Col 2 (x=145) -->
        <line x1="145" y1="55" x2="145" y2="220"/>
        <line x1="145" y1="275" x2="145" y2="385"/>
        <line x1="145" y1="440" x2="145" y2="550"/>
        <line x1="145" y1="605" x2="145" y2="660"/>

        <!-- Col 3 (x=200) -->
        <line x1="200" y1="55" x2="200" y2="110"/>
        <line x1="200" y1="165" x2="200" y2="330"/>
        <line x1="200" y1="385" x2="200" y2="440"/>
        <line x1="200" y1="495" x2="200" y2="550"/>
        <line x1="200" y1="605" x2="200" y2="660"/>

        <!-- Col 4 (x=255) -->
        <line x1="255" y1="55" x2="255" y2="165"/>
        <line x1="255" y1="220" x2="255" y2="275"/>
        <line x1="255" y1="330" x2="255" y2="385"/>
        <line x1="255" y1="440" x2="255" y2="495"/>
        <line x1="255" y1="550" x2="255" y2="605"/>
        <line x1="255" y1="605" x2="255" y2="660"/>

        <!-- Col 5 (x=310) -->
        <line x1="310" y1="55" x2="310" y2="165"/>
        <line x1="310" y1="220" x2="310" y2="330"/>
        <line x1="310" y1="385" x2="310" y2="440"/>
        <line x1="310" y1="495" x2="310" y2="550"/>
        <line x1="310" y1="605" x2="310" y2="660"/>

        <!-- Col 6 (x=365) -->
        <line x1="365" y1="55" x2="365" y2="110"/>
        <line x1="365" y1="165" x2="365" y2="275"/>
        <line x1="365" y1="330" x2="365" y2="440"/>
        <line x1="365" y1="495" x2="365" y2="550"/>
        <line x1="365" y1="550" x2="365" y2="660"/>

        <!-- Col 7 (x=420) -->
        <line x1="420" y1="55" x2="420" y2="165"/>
        <line x1="420" y1="220" x2="420" y2="275"/>
        <line x1="420" y1="330" x2="420" y2="440"/>
        <line x1="420" y1="495" x2="420" y2="605"/>

        <!-- Col 8 (x=475) -->
        <line x1="475" y1="55" x2="475" y2="165"/>
        <line x1="475" y1="220" x2="475" y2="275"/>
        <line x1="475" y1="330" x2="475" y2="440"/>
        <line x1="475" y1="495" x2="475" y2="550"/>

        <!-- Col 9 (x=530) -->
        <line x1="530" y1="55" x2="530" y2="110"/>
        <line x1="530" y1="165" x2="530" y2="275"/>
        <line x1="530" y1="330" x2="530" y2="440"/>
        <line x1="530" y1="495" x2="530" y2="660"/>
      </g>

      <!-- Space station GOAL at top -->
      <g transform="translate(290, 28)">
        <rect x="-38" y="-10" width="76" height="20" rx="8" fill="#E8F4FD"/>
        <rect x="-38" y="-10" width="76" height="20" rx="8" fill="none" stroke="#8BB8E8" stroke-width="2.5"/>
        <circle cx="0" cy="0" r="15" fill="#D4EAF7" stroke="#8BB8E8" stroke-width="2.5"/>
        <rect x="-40" y="-4" width="5" height="8" rx="1.5" fill="#A8C8E0"/>
        <rect x="35" y="-4" width="5" height="8" rx="1.5" fill="#A8C8E0"/>
        <rect x="-68" y="-15" width="20" height="30" rx="3" fill="#FFD93D" opacity="0.6" stroke="#E8C800" stroke-width="1.5"/>
        <line x1="-58" y1="-15" x2="-58" y2="15" stroke="#E8C800" stroke-width="0.8" opacity="0.4"/>
        <rect x="48" y="-15" width="20" height="30" rx="3" fill="#FFD93D" opacity="0.6" stroke="#E8C800" stroke-width="1.5"/>
        <line x1="58" y1="-15" x2="58" y2="15" stroke="#E8C800" stroke-width="0.8" opacity="0.4"/>
        <line x1="0" y1="-15" x2="0" y2="-26" stroke="#8BB8E8" stroke-width="2"/>
        <circle cx="0" cy="-28" r="3" fill="#FF6B4A"/>
        <circle cx="-5" cy="0" r="2" fill="#FFF"/><circle cx="5" cy="0" r="2" fill="#FFF"/>
        <circle cx="-5" cy="0" r="1" fill="#333"/><circle cx="5" cy="0" r="1" fill="#333"/>
        <path d="M-3 3 Q0 6 3 3" fill="none" stroke="#333" stroke-width="1" stroke-linecap="round"/>
      </g>
      <text x="290" y="65" font-size="15" fill="#4A90D9" font-weight="700" text-anchor="middle">🏠 空间站（终点）</text>

      <!-- Rocket START at bottom -->
      <g transform="translate(290, 720)">
        <text x="0" y="38" font-size="15" fill="#E85D3A" font-weight="700" text-anchor="middle">🚀 小火箭（起点）</text>
        <ellipse cx="0" cy="28" rx="14" ry="6" fill="#FF6B4A" opacity="0.5"/>
        <rect x="-8" y="-18" width="16" height="26" rx="7" fill="#FF7B5A"/>
        <polygon points="0,-30 -10,-18 10,-18" fill="#E85D3A"/>
        <circle cx="-4" cy="-8" r="3.5" fill="#FFE882"/>
        <circle cx="4" cy="-8" r="3.5" fill="#FFE882"/>
        <circle cx="0" cy="0" r="3.5" fill="#FFE882"/>
        <rect x="-12" y="-22" width="5" height="10" rx="2.5" fill="#FFB347"/>
        <rect x="7" y="-22" width="5" height="10" rx="2.5" fill="#FFB347"/>
        <circle cx="-4" cy="-14" r="2" fill="#FFF"/><circle cx="4" cy="-14" r="2" fill="#FFF"/>
        <circle cx="-4" cy="-14" r="1" fill="#333"/><circle cx="4" cy="-14" r="1" fill="#333"/>
        <path d="M-3 -12 Q0 -8 3 -12" fill="none" stroke="#FFF" stroke-width="1.2" stroke-linecap="round"/>
      </g>

      <!-- Dead-end planet markers -->
      <g transform="translate(70, 130)">
        <circle cx="0" cy="0" r="20" fill="#FFB347" opacity="0.7"/>
        <ellipse cx="0" cy="0" rx="32" ry="6" fill="#FFD89B" opacity="0.45" transform="rotate(-25)"/>
        <text x="0" y="34" font-size="13" fill="#C90" font-weight="700" text-anchor="middle">✕ 走不通</text>
      </g>

      <g transform="translate(505, 250)">
        <circle cx="0" cy="0" r="18" fill="#8BB8E8" opacity="0.65"/>
        <circle cx="-4" cy="-4" r="5" fill="#6A9FD8" opacity="0.4"/>
        <circle cx="6" cy="3" r="4" fill="#6A9FD8" opacity="0.35"/>
        <text x="0" y="30" font-size="13" fill="#4A90D9" font-weight="700" text-anchor="middle">✕ 走不通</text>
      </g>

      <g transform="translate(70, 470)">
        <circle cx="0" cy="0" r="16" fill="#E87D6A" opacity="0.65"/>
        <circle cx="-3" cy="-3" r="3" fill="#C9654F" opacity="0.35"/>
        <circle cx="5" cy="2" r="2.5" fill="#C9654F" opacity="0.3"/>
        <text x="0" y="28" font-size="13" fill="#C9654F" font-weight="700" text-anchor="middle">✕ 堵住了</text>
      </g>

      <!-- Pass-through planets (no dead-end mark) -->
      <g transform="translate(420, 360)">
        <circle cx="0" cy="0" r="20" fill="#C9B1D9" opacity="0.65"/>
        <ellipse cx="0" cy="0" rx="30" ry="6" fill="#D9C8E8" opacity="0.45" transform="rotate(-15)"/>
        <circle cx="-4" cy="-3" r="2" fill="#FFF"/><circle cx="4" cy="-3" r="2" fill="#FFF"/>
        <circle cx="-4" cy="-3" r="1" fill="#333"/><circle cx="4" cy="-3" r="1" fill="#333"/>
      </g>

      <g transform="translate(170, 360)">
        <circle cx="0" cy="0" r="16" fill="#7EC8A0" opacity="0.65"/>
        <circle cx="-5" cy="-3" r="5" fill="#5BAF8A" opacity="0.4"/>
        <circle cx="2" cy="3" r="3" fill="#5BAF8A" opacity="0.35"/>
        <circle cx="-3" cy="-2" r="1.5" fill="#FFF"/><circle cx="2" cy="-2" r="1.5" fill="#FFF"/>
        <circle cx="-3" cy="-2" r="0.8" fill="#333"/><circle cx="2" cy="-2" r="0.8" fill="#333"/>
      </g>

      <!-- Asteroid field -->
      <g opacity="0.3">
        <circle cx="470" cy="680" r="8" fill="#C9B99A"/>
        <circle cx="500" cy="700" r="5" fill="#D4C4A8"/>
        <circle cx="440" cy="710" r="6" fill="#C9B99A"/>
        <circle cx="100" cy="680" r="6" fill="#D4C4A8"/>
        <circle cx="120" cy="710" r="5" fill="#C9B99A"/>
        <circle cx="160" cy="680" r="7" fill="#D4C4A8"/>
      </g>

      <!-- Comet -->
      <g transform="translate(520, 90)" opacity="0.45">
        <circle cx="0" cy="0" r="4" fill="#FFE882"/>
        <line x1="0" y1="0" x2="-35" y2="18" stroke="#FFE882" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="-10" y1="5" x2="-35" y2="18" stroke="#FFE882" stroke-width="1.2" stroke-linecap="round"/>
      </g>

      <!-- Edge labels -->
      <text x="18" y="380" font-size="12" fill="#CCC" transform="rotate(-90, 18, 380)">太 空 边 界</text>
      <text x="565" y="380" font-size="12" fill="#CCC" transform="rotate(90, 565, 380)">太 空 边 界</text>

    </svg>
  </div>

  <div class="hint-box">
    <div class="icon">💡</div>
    <div>
      <strong>给妈妈的小贴士：</strong>让宝宝用手指或铅笔沿着路走。走错了别急着帮忙，问"这条路能到空间站吗？要不要回头试试别的路？" 完成后可以问"你绕过了哪几颗行星呀？"
    </div>
  </div>

  <div class="footer">
    <span style="color:#E85D3A;">♥</span> 妈妈陪你一起冒险 <span style="color:#E85D3A;">♥</span> &nbsp;|&nbsp;
    完成日期：____月____日 &nbsp;|&nbsp;
    ⭐ 贴纸奖励 ⭐
  </div>

</div>
</body>
</html>
