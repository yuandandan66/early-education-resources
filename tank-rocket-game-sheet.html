<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克火箭大冒险 · 思维游戏纸</title>
<style>
  @page { size: A4; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    display: flex; justify-content: center;
    background: #f0f0f0;
  }
  .page {
    width: 210mm; min-height: 297mm;
    background: #FFFEF9;
    padding: 12mm 14mm 10mm;
    position: relative;
    overflow: hidden;
    box-shadow: 0 2px 20px rgba(0,0,0,0.08);
  }
  .header {
    text-align: center;
    margin-bottom: 8mm;
    position: relative;
  }
  .header h1 {
    font-size: 26px;
    font-weight: 700;
    color: #E85D3A;
    letter-spacing: 2px;
  }
  .header .subtitle {
    font-size: 13px;
    color: #888;
    margin-top: 2px;
    letter-spacing: 1px;
  }
  .header .deco-left, .header .deco-right {
    position: absolute;
    top: -8px;
  }
  .header .deco-left { left: 15%; }
  .header .deco-right { right: 15%; }

  .games-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6mm 7mm;
  }
  .game-box {
    border: 2px dashed #E8D5C4;
    border-radius: 14px;
    padding: 6mm 5mm 4mm;
    position: relative;
    background: #FFFDF8;
  }
  .game-box .game-label {
    position: absolute;
    top: -11px;
    left: 12px;
    background: #FFFEF9;
    padding: 0 8px;
    font-size: 14px;
    font-weight: 700;
    color: #E85D3A;
  }
  .game-box .game-title {
    font-size: 15px;
    font-weight: 600;
    color: #4A3728;
    margin-bottom: 3mm;
    text-align: center;
  }
  .game-box .game-instruction {
    font-size: 11px;
    color: #999;
    text-align: center;
    margin-bottom: 2mm;
  }
  .game-box.full-width {
    grid-column: 1 / -1;
  }
  svg.game-svg {
    width: 100%;
    height: auto;
    display: block;
  }
  .footer {
    text-align: center;
    margin-top: 6mm;
    font-size: 10px;
    color: #CCC;
    letter-spacing: 1px;
  }
  .star-deco {
    position: absolute;
    opacity: 0.12;
    pointer-events: none;
  }

  @media print {
    body { background: white; }
    .page {
      box-shadow: none;
      width: 100%;
      min-height: auto;
    }
  }
</style>
</head>
<body>
<div class="page">

  <!-- ====== Header ====== -->
  <div class="header">
    <svg class="deco-left" width="48" height="48" viewBox="0 0 48 48">
      <circle cx="24" cy="24" r="10" fill="#FFD93D" opacity="0.7"/>
      <circle cx="24" cy="24" r="6" fill="#FFE882" opacity="0.5"/>
      <line x1="24" y1="4" x2="24" y2="14" stroke="#FFD93D" stroke-width="2" stroke-linecap="round"/>
      <line x1="24" y1="34" x2="24" y2="44" stroke="#FFD93D" stroke-width="2" stroke-linecap="round"/>
      <line x1="4" y1="24" x2="14" y2="24" stroke="#FFD93D" stroke-width="2" stroke-linecap="round"/>
      <line x1="34" y1="24" x2="44" y2="24" stroke="#FFD93D" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <h1>🚀 坦克火箭大冒险 🚀</h1>
    <div class="subtitle">3-4岁思维游戏纸 · 观察力 · 数感 · 逻辑</div>
    <svg class="deco-right" width="48" height="48" viewBox="0 0 48 48">
      <ellipse cx="24" cy="28" rx="16" ry="6" fill="#7EC8A0" opacity="0.6"/>
      <rect x="18" y="10" width="12" height="18" rx="3" fill="#A8D8B9" opacity="0.7"/>
      <polygon points="24,2 30,10 18,10" fill="#7EC8A0" opacity="0.6"/>
    </svg>
  </div>

  <!-- ====== Games Grid ====== -->
  <div class="games-grid">

    <!-- Game 1: Rocket Maze -->
    <div class="game-box">
      <div class="game-label">游戏一</div>
      <div class="game-title">🔭 火箭找空间站（迷宫）</div>
      <div class="game-instruction">帮小火箭穿过行星带，找到空间站吧！用铅笔画路线～</div>
      <svg class="game-svg" viewBox="0 0 320 280" xmlns="http://www.w3.org/2000/svg">
        <!-- Background stars -->
        <circle cx="30" cy="20" r="1.5" fill="#FFD93D" opacity="0.5"/>
        <circle cx="80" cy="250" r="1.5" fill="#FFD93D" opacity="0.5"/>
        <circle cx="200" cy="30" r="1.5" fill="#FFD93D" opacity="0.5"/>
        <circle cx="290" cy="100" r="1.5" fill="#FFD93D" opacity="0.5"/>
        <circle cx="150" cy="260" r="1.5" fill="#FFD93D" opacity="0.5"/>
        <circle cx="300" cy="220" r="1" fill="#FFD93D" opacity="0.4"/>
        <circle cx="50" cy="140" r="1" fill="#FFD93D" opacity="0.4"/>
        <circle cx="260" cy="50" r="1" fill="#FFD93D" opacity="0.4"/>

        <!-- Maze boundary -->
        <rect x="15" y="15" width="290" height="250" rx="12" fill="none" stroke="#C9B99A" stroke-width="2" stroke-dasharray="6,3"/>

        <!-- Maze paths - simplified for 3.5yo -->
        <rect x="30" y="100" width="60" height="8" rx="4" fill="#E8D5C4" opacity="0.5"/>
        <rect x="70" y="40" width="8" height="70" rx="4" fill="#E8D5C4" opacity="0.5"/>
        <rect x="70" y="180" width="8" height="60" rx="4" fill="#E8D5C4" opacity="0.5"/>
        <rect x="140" y="100" width="8" height="80" rx="4" fill="#E8D5C4" opacity="0.5"/>
        <rect x="140" y="30" width="8" height="40" rx="4" fill="#E8D5C4" opacity="0.5"/>
        <rect x="120" y="200" width="50" height="8" rx="4" fill="#E8D5C4" opacity="0.5"/>
        <rect x="200" y="130" width="8" height="78" rx="4" fill="#E8D5C4" opacity="0.5"/>
        <rect x="200" y="50" width="8" height="50" rx="4" fill="#E8D5C4" opacity="0.5"/>
        <rect x="200" y="230" width="80" height="8" rx="4" fill="#E8D5C4" opacity="0.5"/>

        <!-- Planets (obstacles) -->
        <!-- Planet 1 - Saturn-like -->
        <ellipse cx="55" cy="165" rx="22" ry="22" fill="#FFB347" opacity="0.7"/>
        <ellipse cx="55" cy="165" rx="34" ry="6" fill="#FFD89B" opacity="0.5" transform="rotate(-20,55,165)"/>
        <circle cx="50" cy="160" r="2" fill="#E88D2A" opacity="0.5"/>
        <circle cx="60" cy="170" r="1.5" fill="#E88D2A" opacity="0.4"/>

        <!-- Planet 2 - Earth-like -->
        <circle cx="175" cy="170" r="20" fill="#7EC8A0" opacity="0.65"/>
        <ellipse cx="168" cy="165" rx="6" ry="5" fill="#5BAF8A" opacity="0.5"/>
        <ellipse cx="178" cy="175" rx="4" ry="3" fill="#5BAF8A" opacity="0.4"/>

        <!-- Planet 3 - Red/Mars -->
        <circle cx="260" cy="85" r="17" fill="#E87D6A" opacity="0.65"/>
        <circle cx="255" cy="80" r="2" fill="#C9654F" opacity="0.4"/>
        <circle cx="265" cy="88" r="1.5" fill="#C9654F" opacity="0.3"/>

        <!-- Planet 4 - Small blue -->
        <circle cx="120" cy="60" r="13" fill="#8BB8E8" opacity="0.65"/>
        <circle cx="117" cy="57" r="1.5" fill="#6A9FD8" opacity="0.4"/>

        <!-- Asteroid with face -->
        <circle cx="100" cy="250" r="12" fill="#C9B99A" opacity="0.8"/>
        <circle cx="96" cy="247" r="1.5" fill="#5C4F3A"/>
        <circle cx="104" cy="247" r="1.5" fill="#5C4F3A"/>
        <path d="M96 253 Q100 257 104 253" fill="none" stroke="#5C4F3A" stroke-width="1.2" stroke-linecap="round"/>

        <!-- START: Rocket -->
        <g transform="translate(30, 135)">
          <ellipse cx="0" cy="10" rx="6" ry="3" fill="#FF6B4A" opacity="0.6"/>
          <rect x="-5" y="-8" width="10" height="18" rx="5" fill="#FF7B5A"/>
          <polygon points="0,-14 -5,-8 5,-8" fill="#E85D3A"/>
          <circle cx="-2.5" cy="-2" r="2" fill="#FFE882"/>
          <circle cx="2.5" cy="-2" r="2" fill="#FFE882"/>
          <circle cx="0" cy="3" r="2" fill="#FFE882"/>
          <!-- Rocket face -->
          <circle cx="-2.5" cy="-5" r="1.2" fill="#FFF"/>
          <circle cx="2.5" cy="-5" r="1.2" fill="#FFF"/>
          <circle cx="-2.5" cy="-5" r="0.7" fill="#333"/>
          <circle cx="2.5" cy="-5" r="0.7" fill="#333"/>
          <path d="M-2 -3 Q0 -1 2 -3" fill="none" stroke="#FFF" stroke-width="0.8" stroke-linecap="round"/>
        </g>
        <text x="30" y="165" font-size="9" fill="#E85D3A" font-weight="600">起点</text>

        <!-- GOAL: Space station -->
        <g transform="translate(275, 235)">
          <rect x="-18" y="-5" width="36" height="10" rx="3" fill="#8BB8E8" opacity="0.8"/>
          <rect x="-10" y="-14" width="20" height="10" rx="2" fill="#A8C8E8" opacity="0.8"/>
          <rect x="-5" y="-22" width="10" height="8" rx="2" fill="#C0D8F0" opacity="0.8"/>
          <!-- Solar panels -->
          <rect x="-28" y="-6" width="10" height="12" rx="1" fill="#FFD93D" opacity="0.6"/>
          <rect x="18" y="-6" width="10" height="12" rx="1" fill="#FFD93D" opacity="0.6"/>
          <!-- Smiley face on station -->
          <circle cx="0" cy="-10" r="1" fill="#333"/>
          <circle cx="4" cy="-10" r="1" fill="#333"/>
          <path d="M-3 -7 Q0 -4 3 -7" fill="none" stroke="#333" stroke-width="0.7" stroke-linecap="round"/>
        </g>
        <text x="280" y="260" font-size="9" fill="#4A90D9" font-weight="600">终点</text>
      </svg>
    </div>

    <!-- Game 2: Tank Shadow Match -->
    <div class="game-box">
      <div class="game-label">游戏二</div>
      <div class="game-title">🎯 坦克影子配对</div>
      <div class="game-instruction">每辆坦克都有自己的影子，用线连起来吧！</div>
      <svg class="game-svg" viewBox="0 0 320 280" xmlns="http://www.w3.org/2000/svg">
        <!-- Left column: tanks -->
        <!-- Tank 1 - Green -->
        <g transform="translate(50, 55)">
          <rect x="-22" y="-8" width="44" height="16" rx="5" fill="#7EC8A0"/>
          <rect x="-28" y="-4" width="56" height="8" rx="2" fill="#5BAF8A"/>
          <circle cx="-22" cy="10" r="5" fill="#4A7860" stroke="#3D6350" stroke-width="1"/>
          <circle cx="0" cy="10" r="5" fill="#4A7860" stroke="#3D6350" stroke-width="1"/>
          <circle cx="22" cy="10" r="5" fill="#4A7860" stroke="#3D6350" stroke-width="1"/>
          <rect x="-5" y="-18" width="10" height="12" rx="3" fill="#5BAF8A"/>
          <rect x="-3" y="-24" width="6" height="8" rx="2" fill="#7EC8A0"/>
          <!-- Face -->
          <circle cx="-6" cy="-12" r="1.2" fill="#FFF"/>
          <circle cx="2" cy="-12" r="1.2" fill="#FFF"/>
          <circle cx="-6" cy="-12" r="0.6" fill="#333"/>
          <circle cx="2" cy="-12" r="0.6" fill="#333"/>
          <path d="M-4 -9 Q-2 -7 0 -9" fill="none" stroke="#FFF" stroke-width="0.7"/>
        </g>
        <text x="50" y="90" font-size="9" fill="#666" text-anchor="middle">绿色坦克</text>

        <!-- Tank 2 - Orange -->
        <g transform="translate(50, 155)">
          <rect x="-18" y="-6" width="36" height="12" rx="4" fill="#FFB347"/>
          <rect x="-22" y="-3" width="44" height="6" rx="2" fill="#E8962A"/>
          <circle cx="-16" cy="8" r="4" fill="#8B6914" stroke="#6B5010" stroke-width="1"/>
          <circle cx="0" cy="8" r="4" fill="#8B6914" stroke="#6B5010" stroke-width="1"/>
          <circle cx="16" cy="8" r="4" fill="#8B6914" stroke="#6B5010" stroke-width="1"/>
          <rect x="-4" y="-14" width="8" height="9" rx="3" fill="#E8962A"/>
          <rect x="-2" y="-19" width="4" height="6" rx="2" fill="#FFB347"/>
          <!-- Face -->
          <circle cx="-5" cy="-9" r="1" fill="#FFF"/>
          <circle cx="1" cy="-9" r="1" fill="#FFF"/>
          <circle cx="-5" cy="-9" r="0.5" fill="#333"/>
          <circle cx="1" cy="-9" r="0.5" fill="#333"/>
          <path d="M-3 -7 Q-2 -5 0 -7" fill="none" stroke="#FFF" stroke-width="0.6"/>
        </g>
        <text x="50" y="190" font-size="9" fill="#666" text-anchor="middle">橙色坦克</text>

        <!-- Tank 3 - Blue -->
        <g transform="translate(50, 245)">
          <rect x="-20" y="-7" width="40" height="14" rx="4" fill="#7BA7D0"/>
          <rect x="-24" y="-3" width="48" height="6" rx="2" fill="#5B87B0"/>
          <circle cx="-18" cy="9" r="4.5" fill="#3A5A7A" stroke="#2A4A6A" stroke-width="1"/>
          <circle cx="18" cy="9" r="4.5" fill="#3A5A7A" stroke="#2A4A6A" stroke-width="1"/>
          <rect x="-4" y="-16" width="8" height="10" rx="3" fill="#5B87B0"/>
          <rect x="-3" y="-22" width="6" height="8" rx="2" fill="#7BA7D0"/>
          <!-- Face -->
          <circle cx="-5" cy="-11" r="1.1" fill="#FFF"/>
          <circle cx="1" cy="-11" r="1.1" fill="#FFF"/>
          <circle cx="-5" cy="-11" r="0.6" fill="#333"/>
          <circle cx="1" cy="-11" r="0.6" fill="#333"/>
        </g>
        <text x="50" y="275" font-size="9" fill="#666" text-anchor="middle">蓝色坦克</text>

        <!-- Right column: shadows -->
        <!-- Shadow 1 -->
        <g transform="translate(245, 55)" opacity="0.55">
          <rect x="-22" y="-8" width="44" height="16" rx="5" fill="#888"/>
          <rect x="-28" y="-4" width="56" height="8" rx="2" fill="#888"/>
          <circle cx="-22" cy="10" r="5" fill="#888"/>
          <circle cx="0" cy="10" r="5" fill="#888"/>
          <circle cx="22" cy="10" r="5" fill="#888"/>
          <rect x="-5" y="-18" width="10" height="12" rx="3" fill="#888"/>
          <rect x="-3" y="-24" width="6" height="8" rx="2" fill="#888"/>
        </g>
        <text x="245" y="90" font-size="9" fill="#999" text-anchor="middle">影子</text>

        <!-- Shadow 2 (different ordering!) -->
        <g transform="translate(245, 155)" opacity="0.55">
          <rect x="-20" y="-7" width="40" height="14" rx="4" fill="#888"/>
          <rect x="-24" y="-3" width="48" height="6" rx="2" fill="#888"/>
          <circle cx="-18" cy="9" r="4.5" fill="#888"/>
          <circle cx="18" cy="9" r="4.5" fill="#888"/>
          <rect x="-4" y="-16" width="8" height="10" rx="3" fill="#888"/>
          <rect x="-3" y="-22" width="6" height="8" rx="2" fill="#888"/>
        </g>
        <text x="245" y="190" font-size="9" fill="#999" text-anchor="middle">影子</text>

        <!-- Shadow 3 -->
        <g transform="translate(245, 245)" opacity="0.55">
          <rect x="-18" y="-6" width="36" height="12" rx="4" fill="#888"/>
          <rect x="-22" y="-3" width="44" height="6" rx="2" fill="#888"/>
          <circle cx="-16" cy="8" r="4" fill="#888"/>
          <circle cx="0" cy="8" r="4" fill="#888"/>
          <circle cx="16" cy="8" r="4" fill="#888"/>
          <rect x="-4" y="-14" width="8" height="9" rx="3" fill="#888"/>
          <rect x="-2" y="-19" width="4" height="6" rx="2" fill="#888"/>
        </g>
        <text x="245" y="275" font-size="9" fill="#999" text-anchor="middle">影子</text>

        <!-- Dotted guide lines -->
        <line x1="90" y1="55" x2="190" y2="155" stroke="#DDD" stroke-width="1" stroke-dasharray="4,4"/>
        <line x1="90" y1="155" x2="190" y2="55" stroke="#DDD" stroke-width="1" stroke-dasharray="4,4"/>
        <line x1="90" y1="245" x2="190" y2="245" stroke="#DDD" stroke-width="1" stroke-dasharray="4,4"/>
      </svg>
    </div>

    <!-- Game 3: Count the Stars -->
    <div class="game-box">
      <div class="game-label">游戏三</div>
      <div class="game-title">⭐ 数一数有多少（点数）</div>
      <div class="game-instruction">数数每组有多少个，把数字写在方框里吧！</div>
      <svg class="game-svg" viewBox="0 0 320 210" xmlns="http://www.w3.org/2000/svg">
        <!-- Row 1: Rockets -->
        <text x="20" y="25" font-size="10" fill="#888">第1组：</text>
        <g transform="translate(80, 40)">
          <polygon points="0,-18 -8,-6 8,-6" fill="#FF8364"/>
          <rect x="-6" y="-6" width="12" height="20" rx="4" fill="#FFA07A"/>
          <circle cx="-3" cy="2" r="2.5" fill="#FFE882"/>
          <circle cx="3" cy="2" r="2.5" fill="#FFE882"/>
          <circle cx="0" cy="8" r="2.5" fill="#FFE882"/>
          <ellipse cx="0" cy="16" rx="7" ry="3" fill="#FF6B4A" opacity="0.6"/>
          <circle cx="-2" cy="-11" r="1" fill="#FFF"/>
          <circle cx="2" cy="-11" r="1" fill="#FFF"/>
          <circle cx="-2" cy="-11" r="0.5" fill="#333"/>
          <circle cx="2" cy="-11" r="0.5" fill="#333"/>
        </g>
        <g transform="translate(130, 40)">
          <polygon points="0,-18 -8,-6 8,-6" fill="#FF8364"/>
          <rect x="-6" y="-6" width="12" height="20" rx="4" fill="#FFA07A"/>
          <circle cx="-3" cy="2" r="2.5" fill="#FFE882"/>
          <circle cx="3" cy="2" r="2.5" fill="#FFE882"/>
          <circle cx="0" cy="8" r="2.5" fill="#FFE882"/>
          <ellipse cx="0" cy="16" rx="7" ry="3" fill="#FF6B4A" opacity="0.6"/>
          <circle cx="-2" cy="-11" r="1" fill="#FFF"/>
          <circle cx="2" cy="-11" r="1" fill="#FFF"/>
          <circle cx="-2" cy="-11" r="0.5" fill="#333"/>
          <circle cx="2" cy="-11" r="0.5" fill="#333"/>
        </g>
        <g transform="translate(180, 40)">
          <polygon points="0,-18 -8,-6 8,-6" fill="#FF8364"/>
          <rect x="-6" y="-6" width="12" height="20" rx="4" fill="#FFA07A"/>
          <circle cx="-3" cy="2" r="2.5" fill="#FFE882"/>
          <circle cx="3" cy="2" r="2.5" fill="#FFE882"/>
          <circle cx="0" cy="8" r="2.5" fill="#FFE882"/>
          <ellipse cx="0" cy="16" rx="7" ry="3" fill="#FF6B4A" opacity="0.6"/>
          <circle cx="-2" cy="-11" r="1" fill="#FFF"/>
          <circle cx="2" cy="-11" r="1" fill="#FFF"/>
          <circle cx="-2" cy="-11" r="0.5" fill="#333"/>
          <circle cx="2" cy="-11" r="0.5" fill="#333"/>
        </g>
        <rect x="240" y="28" width="28" height="28" rx="4" fill="none" stroke="#C9B99A" stroke-width="1.5"/>

        <!-- Row 2: Tanks -->
        <text x="20" y="90" font-size="10" fill="#888">第2组：</text>
        <g transform="translate(80, 105)">
          <rect x="-16" y="-5" width="32" height="10" rx="4" fill="#7EC8A0"/>
          <rect x="-20" y="-2" width="40" height="5" rx="2" fill="#5BAF8A"/>
          <circle cx="-14" cy="7" r="3.5" fill="#4A7860" stroke="#3D6350" stroke-width="0.8"/>
          <circle cx="0" cy="7" r="3.5" fill="#4A7860" stroke="#3D6350" stroke-width="0.8"/>
          <circle cx="14" cy="7" r="3.5" fill="#4A7860" stroke="#3D6350" stroke-width="0.8"/>
          <rect x="-4" y="-12" width="8" height="8" rx="3" fill="#5BAF8A"/>
          <circle cx="-3" cy="-7" r="0.8" fill="#FFF"/>
          <circle cx="1" cy="-7" r="0.8" fill="#FFF"/>
          <circle cx="-3" cy="-7" r="0.4" fill="#333"/>
          <circle cx="1" cy="-7" r="0.4" fill="#333"/>
        </g>
        <g transform="translate(140, 105)">
          <rect x="-16" y="-5" width="32" height="10" rx="4" fill="#7EC8A0"/>
          <rect x="-20" y="-2" width="40" height="5" rx="2" fill="#5BAF8A"/>
          <circle cx="-14" cy="7" r="3.5" fill="#4A7860" stroke="#3D6350" stroke-width="0.8"/>
          <circle cx="0" cy="7" r="3.5" fill="#4A7860" stroke="#3D6350" stroke-width="0.8"/>
          <circle cx="14" cy="7" r="3.5" fill="#4A7860" stroke="#3D6350" stroke-width="0.8"/>
          <rect x="-4" y="-12" width="8" height="8" rx="3" fill="#5BAF8A"/>
          <circle cx="-3" cy="-7" r="0.8" fill="#FFF"/>
          <circle cx="1" cy="-7" r="0.8" fill="#FFF"/>
          <circle cx="-3" cy="-7" r="0.4" fill="#333"/>
          <circle cx="1" cy="-7" r="0.4" fill="#333"/>
        </g>
        <rect x="240" y="92" width="28" height="28" rx="4" fill="none" stroke="#C9B99A" stroke-width="1.5"/>

        <!-- Row 3: Stars -->
        <text x="20" y="155" font-size="10" fill="#888">第3组：</text>
        <!-- Stars drawn with polygon -->
        <g transform="translate(82, 170)">
          <polygon points="0,-12 3,-4 12,-4 5,2 7,10 0,5 -7,10 -5,2 -12,-4 -3,-4" fill="#FFD93D" opacity="0.8"/>
        </g>
        <g transform="translate(112, 170)">
          <polygon points="0,-12 3,-4 12,-4 5,2 7,10 0,5 -7,10 -5,2 -12,-4 -3,-4" fill="#FFD93D" opacity="0.8"/>
        </g>
